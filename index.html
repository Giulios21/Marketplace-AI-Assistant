<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marketplace AI Assistant</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

   <div class="header">
    <img src="img/logo.png" alt="Marketplace AI Assistant Logo" class="logo">
    <h1>Marketplace AI Assistant</h1>
</div>

    <p>
        Crea annunci ottimizzati per Vinted, Subito ed eBay
        con l'intelligenza artificiale
    </p>

    <span class="badge">
        🤖 AI Powered
    </span>



    <label for="marketplace"><strong>Marketplace</strong></label>

    <select id="marketplace">
        <option value="vinted">Vinted</option>
        <option value="subito">Subito</option>
        <option value="ebay">eBay</option>
    </select>


    <label for="marca">Marca</label>
    <input type="text" id="marca" placeholder="Es. Nike">


    <label for="categoria">Categoria</label>
    <input type="text" id="categoria" placeholder="Es. Scarpe uomo">

   <label for="dettagli">Taglia / Dettagli prodotto</label>
   <input type="text" id="dettagli" placeholder="Es. Taglia 42, colore nero, 128GB...">


    <label for="prezzo">Prezzo</label>
    <input type="number" id="prezzo" placeholder="Es. 60">


    <label for="condizioni">Condizioni</label>
    <input type="text" id="condizioni" placeholder="Es. Ottime condizioni">


    <label for="descrizione">Descrizione aggiuntiva</label>
    <textarea id="descrizione" placeholder="Inserisci dettagli del prodotto"></textarea>
    <label for="foto">Foto prodotto</label>

    <input type="file" id="foto" accept="image/*">

    <div id="anteprima-foto"></div>


    <button onclick="generaAnnuncio()">
        Genera Annuncio
    </button>


   <div id="risultato" class="preview-card">

    <h2>✨ Anteprima Annuncio</h2>

    <div id="anteprima">

    </div>
    
    <div id="cronologia">
    <h2>📚 Cronologia annunci</h2>
    </div>

    <button onclick="copiaAnnuncio()">
        📋 Copia Annuncio
    </button>

</div>





<script src="script.js"></script>

</body>

</html>
